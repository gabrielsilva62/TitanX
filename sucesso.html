<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mensagem Enviada</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

.sucesso-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #0a2540, #1e3a5f);
}

.sucesso-card {
    max-width: 500px;
    width: 100%;
    padding: 40px 30px;
    border-radius: 15px;
    text-align: center;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);

    animation: aparecer 0.6s ease;
}

.sucesso-icone {
    font-size: 50px;
    margin-bottom: 15px;
}

.sucesso-card h1 {
    color: #ffffff;
    margin-bottom: 10px;
}

.sucesso-card p {
    color: #dcdcdc;
    margin-bottom: 25px;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">TitanX</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a href="servicos.html">Serviços</a>
        <a href="portifolio.html">Portifólio</a>
        <a href="estrutura.html">Estrutura</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>

<section class="sucesso-container">

    <div class="sucesso-card">
        <div class="sucesso-icone">✅</div>

        <h1>Mensagem enviada!</h1>
        <p>Recebemos seu contato e vamos responder o mais rápido possível.</p>

        <a href="index.html" class="btn">Voltar para Home</a>
    </div>

</section>

<footer>
    <p>© 2026 TitanX Technologies</p>
</footer>

</body>
</html>
